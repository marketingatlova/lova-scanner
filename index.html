<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #f8f9fa; padding: 10px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { border: none; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 30px 25px; background: #fff; max-width: 420px; margin: 10px auto; }
    .title { color: #d32e30; font-weight: 800; font-size: 24px; text-align: center; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 25px; }
    .pin-input { font-size: 24px; letter-spacing: 12px; text-align: center; width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 25px; color: #555; }
    .btn-red { background-color: #d32e30; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; font-size: 18px; cursor: pointer; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 800; color: #333; text-transform: uppercase; }
    .dashboard-block { background: #fef2f2; border: 2px solid #fecaca; border-radius: 16px; padding: 35px 20px; text-align: center; margin-bottom: 15px; cursor: pointer; color: #d32e30; font-weight: 800; font-size: 18px; }
    .btn-gray { background-color: #71717a; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; margin-top: 15px; cursor: pointer; font-size: 16px; }

    /* Scanner */
    #videoContainer { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; }
    #video { width: 100%; display: block; }
    #canvas { display: none; }
    .corner-tl, .corner-tr, .corner-bl, .corner-br { content: ''; position: absolute; width: 36px; height: 36px; border-color: #fff; border-style: solid; }
    .corner-tl { top: 18%; left: 12%; border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 18%; right: 12%; border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 18%; left: 12%; border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 18%; right: 12%; border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }
    .dim-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); pointer-events: none;
      -webkit-mask-image: radial-gradient(ellipse 76% 64% at 50% 50%, transparent 99%, black 100%);
      mask-image: radial-gradient(ellipse 76% 64% at 50% 50%, transparent 99%, black 100%); }
    #status { text-align: center; margin-top: 12px; color: #888; font-size: 13px; min-height: 30px; }

    /* Confirmation Popup */
    #popupOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
    }
    #popupOverlay.show { display: flex; }
    #popupCard {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 30px 25px 40px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .popup-tag {
      display: inline-block;
      background: #fef2f2;
      color: #d32e30;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .popup-promo { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
    .popup-brand { font-size: 14px; color: #888; margin-bottom: 20px; }
    .popup-divider { height: 1px; background: #f0f0f0; margin: 16px 0; }
    .popup-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .popup-label { font-size: 13px; color: #999; font-weight: 500; }
    .popup-value { font-size: 13px; color: #333; font-weight: 700; text-align: right; }
    .days-badge {
      background: #ecfdf5;
      color: #065f46;
      font-size: 13px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #a7f3d0;
    }
    .days-badge.urgent { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .popup-code { background: #f8f9fa; border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #666; font-family: monospace; text-align: center; margin: 16px 0; letter-spacing: 1px; }
    .btn-redeem { background: #d32e30; color: white; border-radius: 14px; padding: 18px; font-weight: 800; border: none; width: 100%; font-size: 18px; cursor: pointer; margin-top: 8px; letter-spacing: 0.5px; }
    .btn-cancel { background: #f1f1f1; color: #555; border-radius: 14px; padding: 14px; font-weight: 700; border: none; width: 100%; font-size: 15px; cursor: pointer; margin-top: 10px; }

    /* Error popup */
    #errorOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #errorOverlay.show { display: flex; }
    #errorCard {
      background: #fff;
      border-radius: 20px;
      padding: 30px 25px;
      width: 85%;
      max-width: 340px;
      text-align: center;
      animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .error-icon { font-size: 40px; margin-bottom: 12px; }
    .error-msg { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 20px; }
    .btn-ok { background: #d32e30; color: white; border-radius: 12px; padding: 12px; font-weight: 700; border: none; width: 100%; font-size: 16px; cursor: pointer; }

    /* Success flash */
    #successOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #successOverlay.show { display: flex; }
    #successCard {
      background: #fff;
      border-radius: 20px;
      padding: 35px 25px;
      width: 85%;
      max-width: 340px;
      text-align: center;
      animation: popIn 0.2s ease;
    }
    .success-icon { font-size: 50px; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: 800; color: #065f46; margin-bottom: 6px; }
    .success-sub { font-size: 14px; color: #888; }
  </style>
</head>
<body>
<div class="container" style="padding:0;">

  <!-- LOGIN -->
  <div id="loginScreen" class="screen active card">
    <div class="title">Lova Staff Access</div>
    <div class="subtitle">Enter your 6-digit passcode</div>
    <input type="tel" id="passcode" class="pin-input" maxlength="6" placeholder="••••••">
    <button onclick="login()" class="btn-red">Login</button>
    <div id="loginStatus" class="text-center mt-3" style="font-weight:600;color:#d32e30;"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="screen card">
    <div class="header-row">
      <span id="userDisplay"></span>
      <button onclick="showScreen('loginScreen')" class="btn btn-sm btn-outline-secondary" style="font-weight:700;">LOGOUT</button>
    </div>
    <hr style="margin-bottom:20px;">
    <div class="dashboard-block" onclick="openScanner()">SCAN VOUCHER</div>
    <div class="dashboard-block" onclick="alert('Manual Promo Selected')">MANUAL PROMOTION</div>
  </div>

  <!-- SCANNER -->
  <div id="scannerScreen" class="screen card">
    <div class="title" style="font-size:18px;margin-bottom:15px;">Point camera at Voucher</div>
    <div id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="dim-overlay"></div>
      <div class="corner-tl"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
    </div>
    <div id="status">Scanning live...</div>
    <button onclick="closeScanner()" class="btn-gray">← Back to Menu</button>
  </div>

</div>

<!-- CONFIRMATION POPUP -->
<div id="popupOverlay">
  <div id="popupCard">
    <div class="popup-tag">Voucher Found</div>
    <div class="popup-promo" id="popupPromo"></div>
    <div class="popup-brand" id="popupBrand"></div>
    <div class="popup-divider"></div>
    <div class="popup-row">
      <span class="popup-label">Valid From</span>
      <span class="popup-value" id="popupFrom"></span>
    </div>
    <div class="popup-row">
      <span class="popup-label">Valid Until</span>
      <span class="popup-value" id="popupTo"></span>
    </div>
    <div class="popup-row">
      <span class="popup-label">Days Left</span>
      <span id="popupDays"></span>
    </div>
    <div class="popup-row">
      <span class="popup-label">Status</span>
      <span class="popup-value" style="color:#16a34a;">● Active</span>
    </div>
    <div class="popup-divider"></div>
    <div class="popup-code" id="popupCode"></div>
    <button class="btn-redeem" onclick="confirmRedeem()">✓ Redeem Voucher</button>
    <button class="btn-cancel" onclick="cancelRedeem()">Cancel — Scan Again</button>
  </div>
</div>

<!-- ERROR POPUP -->
<div id="errorOverlay">
  <div id="errorCard">
    <div class="error-icon">⚠️</div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-ok" onclick="closeError()">OK — Scan Again</button>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div id="successOverlay">
  <div id="successCard">
    <div class="success-icon">✅</div>
    <div class="success-title">Redeemed!</div>
    <div class="success-sub" id="successSub"></div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbysEwgrqz9dG5DDo2LgrcebeKJu4wejIIW1jr3V5mwtvZRHnvdDuR38NmGIC2GceRo1/exec";

  let currentUser = "";
  let videoStream = null;
  let scanInterval = null;
  let scanPaused = false;
  let pendingCode = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  async function callGAS(action, params) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...params }),
      headers: { 'Content-Type': 'text/plain' }
    });
    return res.json();
  }

  async function login() {
    const code = document.getElementById('passcode').value;
    document.getElementById('loginStatus').innerText = "Checking...";
    try {
      const res = await callGAS('verifyStaffLogin', { passcode: code });
      if (res.success) {
        currentUser = res.name;
        document.getElementById('userDisplay').innerText = res.name;
        showScreen('dash');
      } else {
        document.getElementById('loginStatus').innerText = "Incorrect PIN";
      }
    } catch(e) {
      document.getElementById('loginStatus').innerText = "Connection error. Try again.";
    }
  }

  function openScanner() {
    showScreen('scannerScreen');
    document.getElementById('status').innerText = "Starting camera...";
    scanPaused = false;
    startCamera();
  }

  function startCamera() {
    stopCamera();
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    })
    .then(stream => {
      videoStream = stream;
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.play();
      video.onloadedmetadata = () => {
        document.getElementById('status').innerText = "Scanning live...";
        startScanning();
      };
    })
    .catch(err => {
      document.getElementById('status').innerHTML =
        `⚠️ Camera blocked (${err.name})<br>Go to <b>Settings → Safari → Camera → Allow</b><br><br>
        <button onclick="startCamera()" class="btn-red" style="font-size:14px;padding:10px;">🔄 Try Again</button>`;
    });
  }

  function startScanning() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (scanPaused || video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let code = jsQR(img.data, img.width, img.height, { inversionAttempts: "attemptBoth" });
      if (!code) {
        const cropW = Math.floor(canvas.width * 0.7);
        const cropH = Math.floor(canvas.height * 0.6);
        const cropX = Math.floor((canvas.width - cropW) / 2);
        const cropY = Math.floor((canvas.height - cropH) / 2);
        img = ctx.getImageData(cropX, cropY, cropW, cropH);
        code = jsQR(img.data, img.width, img.height, { inversionAttempts: "attemptBoth" });
      }
      if (code) onScanSuccess(code.data);
    }, 150);
  }

  function stopCamera() {
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    const video = document.getElementById('video');
    if (video) video.srcObject = null;
  }

  function closeScanner() {
    stopCamera();
    showScreen('dash');
  }

  async function onScanSuccess(decodedText) {
    scanPaused = true;
    document.getElementById('status').innerText = "Looking up voucher...";
    try {
      const res = await callGAS('lookupVoucher', { scannedCode: decodedText });
      if (res.success) {
        pendingCode = decodedText;
        showConfirmPopup(res);
      } else {
        showError(res.message);
      }
    } catch(e) {
      showError("Connection error. Please try again.");
    }
  }

  function showConfirmPopup(data) {
    document.getElementById('popupPromo').innerText = data.promoName;
    document.getElementById('popupBrand').innerText = data.brand;
    document.getElementById('popupFrom').innerText = data.validFrom;
    document.getElementById('popupTo').innerText = data.validTo;
    document.getElementById('popupCode').innerText = data.code;

    const daysEl = document.getElementById('popupDays');
    if (data.daysLeft !== null) {
      const urgent = data.daysLeft <= 3;
      daysEl.innerHTML = `<span class="days-badge ${urgent ? 'urgent' : ''}">${data.daysLeft} day${data.daysLeft !== 1 ? 's' : ''} left</span>`;
    } else {
      daysEl.innerHTML = `<span class="popup-value">No expiry</span>`;
    }

    document.getElementById('popupOverlay').classList.add('show');
  }

  function cancelRedeem() {
    document.getElementById('popupOverlay').classList.remove('show');
    pendingCode = null;
    scanPaused = false;
    document.getElementById('status').innerText = "Scanning live...";
  }

  async function confirmRedeem() {
    document.getElementById('popupOverlay').classList.remove('show');
    try {
      const res = await callGAS('redeemVoucher', {
        scannedCode: pendingCode, staffName: currentUser, branch: ""
      });
      if (res.success) {
        showSuccess(res.message);
      } else {
        showError(res.message);
      }
    } catch(e) {
      showError("Connection error. Please try again.");
    }
    pendingCode = null;
  }

  function showError(msg) {
    document.getElementById('errorMsg').innerText = msg;
    document.getElementById('errorOverlay').classList.add('show');
  }

  function closeError() {
    document.getElementById('errorOverlay').classList.remove('show');
    scanPaused = false;
    document.getElementById('status').innerText = "Scanning live...";
  }

  function showSuccess(msg) {
    document.getElementById('successSub').innerText = msg;
    document.getElementById('successOverlay').classList.add('show');
    setTimeout(() => {
      document.getElementById('successOverlay').classList.remove('show');
      scanPaused = false;
      document.getElementById('status').innerText = "Scanning live...";
    }, 2500);
  }
</script>
</body>
</html>
