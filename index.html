 <!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #f8f9fa; padding: 10px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .card { border: none; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 30px 25px; background: #fff; max-width: 420px; margin: 10px auto; }
    .title { color: #d32e30; font-weight: 800; font-size: 24px; text-align: center; margin-bottom: 5px; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 25px; }
    .pin-input { font-size: 24px; letter-spacing: 12px; text-align: center; width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 25px; color: #555; }
    .btn-red { background-color: #d32e30; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; font-size: 18px; cursor: pointer; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 800; color: #333; text-transform: uppercase; }
    .dashboard-block { background: #fef2f2; border: 2px solid #fecaca; border-radius: 16px; padding: 35px 20px; text-align: center; margin-bottom: 15px; cursor: pointer; color: #d32e30; font-weight: 800; font-size: 18px; }
    .btn-gray { background-color: #71717a; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; margin-top: 15px; cursor: pointer; }
    #videoContainer { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 3px solid #d32e30; background: #000; min-height: 250px; }
    #video { width: 100%; display: block; }
    #canvas { display: none; }
    .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 200px; height: 200px; border: 3px solid #fff; border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); pointer-events: none; }
    .scan-line { position: absolute; left: 0; right: 0; height: 3px; background: #d32e30; animation: scan 2s linear infinite; }
    @keyframes scan { 0%{top:0} 100%{top:100%} }
    #result { font-weight: 800; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; display: none; }
    .success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .error { background: #fff5f5; color: #c92a2a; border: 1px solid #ffc9c9; }
    #status { text-align: center; margin-top: 12px; color: #666; font-weight: 600; font-size: 14px; min-height: 40px; }
  </style>
</head>
<body>
<div class="container" style="padding:0;">

  <!-- LOGIN -->
  <div id="loginScreen" class="screen active card">
    <div class="title">Lova Staff Access</div>
    <div class="subtitle">Enter your 6-digit passcode</div>
    <input type="tel" id="passcode" class="pin-input" maxlength="6" placeholder="••••••">
    <button onclick="login()" class="btn-red">Login</button>
    <div id="loginStatus" class="text-center mt-3" style="font-weight:600;color:#d32e30;"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dash" class="screen card">
    <div class="header-row">
      <span id="userDisplay"></span>
      <button onclick="showScreen('loginScreen')" class="btn btn-sm btn-outline-secondary" style="font-weight:700;">LOGOUT</button>
    </div>
    <hr style="margin-bottom:20px;">
    <div class="dashboard-block" onclick="openScanner()">SCAN VOUCHER</div>
    <div class="dashboard-block" onclick="alert('Manual Promo Selected')">MANUAL PROMOTION</div>
  </div>

  <!-- SCANNER -->
  <div id="scannerScreen" class="screen card">
    <div class="title" style="font-size:18px;margin-bottom:15px;">Point camera at Voucher</div>
    <div id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay"><div class="scan-line"></div></div>
    </div>
    <div id="status">Starting camera...</div>
    <div id="result"></div>
    <button onclick="closeScanner()" class="btn-gray">← Back to Menu</button>
  </div>

</div>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbysEwgrqz9dG5DDo2LgrcebeKJu4wejIIW1jr3V5mwtvZRHnvdDuR38NmGIC2GceRo1/exec";

  let currentUser = "";
  let videoStream = null;
  let scanInterval = null;
  let scanPaused = false;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  async function callGAS(action, params) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action, ...params }),
      headers: { 'Content-Type': 'text/plain' }
    });
    return res.json();
  }

  async function login() {
    const code = document.getElementById('passcode').value;
    document.getElementById('loginStatus').innerText = "Checking...";
    try {
      const res = await callGAS('verifyStaffLogin', { passcode: code });
      if (res.success) {
        currentUser = res.name;
        document.getElementById('userDisplay').innerText = res.name;
        showScreen('dash');
      } else {
        document.getElementById('loginStatus').innerText = "Incorrect PIN";
      }
    } catch(e) {
      document.getElementById('loginStatus').innerText = "Connection error. Try again.";
    }
  }

  function openScanner() {
    showScreen('scannerScreen');
    document.getElementById('result').style.display = 'none';
    scanPaused = false;
    startCamera();
  }

  function startCamera() {
    stopCamera();
    document.getElementById('status').innerText = "Starting camera...";
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
    })
    .then(stream => {
      videoStream = stream;
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.play();
      video.onloadedmetadata = () => {
        document.getElementById('status').innerText = "Scanning live...";
        startScanning();
      };
    })
    .catch(err => {
      document.getElementById('status').innerHTML =
        `⚠️ Camera blocked (${err.name})<br>Go to <b>Settings → Safari → Camera → Allow</b><br><br>
        <button onclick="startCamera()" class="btn-red" style="font-size:14px;padding:10px;">🔄 Try Again</button>`;
    });
  }

  function startScanning() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    scanInterval = setInterval(() => {
      if (scanPaused || video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
      if (code) onScanSuccess(code.data);
    }, 200);
  }

  function stopCamera() {
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    document.getElementById('video').srcObject = null;
  }

  function closeScanner() {
    stopCamera();
    showScreen('dash');
  }

  async function onScanSuccess(decodedText) {
    scanPaused = true;
    try {
      const res = await callGAS('processVoucherScan', {
        scannedCode: decodedText, staffName: currentUser, branch: ""
      });
      const resDiv = document.getElementById('result');
      resDiv.style.display = 'block';
      resDiv.className = res.success ? 'success' : 'error';
      resDiv.innerText = res.message;
      setTimeout(() => { resDiv.style.display = 'none'; scanPaused = false; }, 3500);
    } catch(e) {
      const resDiv = document.getElementById('result');
      resDiv.style.display = 'block';
      resDiv.className = 'error';
      resDiv.innerText = '❌ Connection error';
      setTimeout(() => { resDiv.style.display = 'none'; scanPaused = false; }, 3500);
    }
  }
</script>
</body>
</html>
